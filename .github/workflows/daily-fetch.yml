name: Daily Article Fetch

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch articles
        run: node scripts/fetch.js
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}

      - name: Build catalog
        run: node scripts/build-catalog.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/ catalog.json latest.md links.md .seen-urls.json
          git diff --staged --quiet || git commit -m "chore: daily fetch $(date -u +%Y-%m-%d)"
          git push
